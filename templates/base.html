<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% block stylesheets %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base_styles.css') }}">
    {% endblock %}
</head>

<body>

    <header class="navbar">
        <div class="container">
            <a href="{{ url_for('home') }}" class="logo">Бюро Знахідок</a>
            <nav class="nav-links">
                <a href="{{ url_for('home') }}">Головна</a>
                <a href="{{ url_for('home') }}">Всі оголошення</a>
                <a href="{{ url_for('about') }}">Про нас</a>
                <a href="{{ url_for('rules') }}">Правила</a>
            </nav>
            <div class="auth-buttons">
                <a href="{{ url_for('login') }}" class="btn btn-login">Увійти</a>
                <a href="{{ url_for('register') }}" class="btn btn-search">Зареєструватися</a>
            </div>
        </div>
    </header>

    <div class="gradient-wrapper">

        {% block body %}
        {% endblock %}

        <footer>
            <div class="container footer-content">
                <p>&copy; 2026 Бюро Знахідок. Усі права захищено.</p>
                <p>Зв'язок з адміністрацією: support@bureau.ua</p>
            </div>
        </footer>
    </div>

</body>

</html>
