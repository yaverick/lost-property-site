<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% block stylesheets %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base_styles.css') }}">
    {% endblock %}
</head>

<body>

    <header class="navbar">
        <div class="container">
            <a href="#" class="logo">Бюро Знахідок</a>
            <nav class="nav-links">
                <a href="#">Головна</a>
                <a href="#">Всі оголошення</a>
                <a href="#">Про нас</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn btn-outline">Увійти</button>
                <button class="btn btn-primary">Зареєструватися</button>
            </div>
        </div>
    </header>

    <div class="gradient-wrapper">
        {% block body %}
        {% endblock %}

        <footer>
            <div class="container footer-content">
                <p>&copy; 2026 Бюро Знахідок. Усі права захищено.</p>
                <p>Зв'язок з адміністрацією: support@bureau.ua</p>
            </div>
        </footer>
    </div>

</body>

</html>
