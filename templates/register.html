{% extends 'base.html' %}

{% block title%}
Бюро знахідок | Реєстрація
{% endblock %}

{% block stylesheets %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register_styles.css') }}">
{% endblock %}

{% block body %}

<main class="auth-container">
    <div class="auth-card">
        <h2>Створити акаунт</h2>
        <p class="auth-subtitle">Приєднуйтесь до спільноти,<br>щоб повертати речі власникам</p>

        <form action="/register" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Ім'я та прізвище</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Номер телефону</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Підтвердіть пароль</label>
                <input type="password" id="confirm-password" name="confirm_password" required>
            </div>

            <div class="form-terms">
                <input type="checkbox" id="terms" required>
                <label class="submit-rules" for="terms">Я згоден з <a href="#">правилами сервісу</a></label>
            </div>

            <button type="submit" class="btn btn-search btn-full">Зареєструватися</button>
        </form>

        <div class="auth-footer">
            <p>Вже маєте акаунт? <a href="{{ url_for('login') }}">Увійти</a></p>
        </div>
    </div>
</main>

{% endblock %}
